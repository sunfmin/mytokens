name: MyTokens
options:
  bundleIdPrefix: com.sunfmin
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: HL27PWAKDF
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
targets:
  MyTokens:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunfmin.mytokens
        PRODUCT_NAME: MyTokens
        CODE_SIGN_ENTITLEMENTS: mytokens.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_LSUIElement: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
  MyTokensTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Sources/Core
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunfmin.mytokens.tests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGNING_ALLOWED: "NO"
schemes:
  MyTokens:
    build:
      targets:
        MyTokens: [run, profile, archive, analyze]
        MyTokensTests: [test]
    test:
      targets:
        - MyTokensTests
    run:
      config: Release
